<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery | ART Association</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="icon" href="../images/logoimage.jpg">

<style>

body{
font-family:Arial, sans-serif;
}

header{
position:sticky;
top:0;
z-index:1000;
backdrop-filter:blur(10px);
background:rgba(255,255,255,0.9);
}

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

.lightbox img{
max-width:85%;
max-height:85%;
border-radius:8px;
}

</style>

</head>

<body class="bg-gray-50">


<!-- NAVBAR -->

<header class="shadow-sm">

<div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

<div class="flex items-center gap-3">

<img src="../images/logoimage.jpg" class="w-10 h-10 rounded-full">

<h1 class="font-bold text-lg">ART Association</h1>

</div>

<nav class="space-x-6">

<a href="../index.html">Home</a>
<a href="../gallery/">Gallery</a>
<a href="../events/">Events</a>

</nav>

</div>

</header>


<!-- PAGE TITLE -->

<section class="py-16 text-center">

<h2 class="text-4xl font-bold mb-4">
Community Gallery
</h2>

<p class="text-gray-600">
Moments from our festivals, workshops and community gatherings.
</p>

</section>



<!-- GALLERY GRID -->

<section class="max-w-6xl mx-auto px-6 pb-20">

<div class="grid md:grid-cols-3 gap-6">

<img src="../images/art7.jpg" class="gallery-img rounded-xl shadow cursor-pointer">

<img src="../images/art2.jpg" class="gallery-img rounded-xl shadow cursor-pointer">

<img src="../images/art3.jpg" class="gallery-img rounded-xl shadow cursor-pointer">

<img src="../images/art4.jpg" class="gallery-img rounded-xl shadow cursor-pointer">

<img src="../images/art6.jpg" class="gallery-img rounded-xl shadow cursor-pointer">

<img src="../images/art5.jpg" class="gallery-img rounded-xl shadow cursor-pointer">

</div>

</section>



<!-- LIGHTBOX -->

<div class="lightbox" id="lightbox">

<img id="lightbox-img">

</div>



<script>

const images=document.querySelectorAll('.gallery-img')
const lightbox=document.getElementById('lightbox')
const lightboxImg=document.getElementById('lightbox-img')

images.forEach(img=>{

img.onclick=()=>{
lightbox.style.display='flex'
lightboxImg.src=img.src
}

})

lightbox.onclick=()=>{
lightbox.style.display='none'
}

</script>


</body>
</html>
